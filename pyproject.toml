[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["alembic/", "venv/", ".venv/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "S"]
ignore = [
    "S101",   # assert statements are fine in tests
    "S105",   # hardcoded passwords — handled by bandit
    "S106",
    "B008",   # FastAPI Depends() calls in function defaults
]
per-file-ignores = { "tests/*" = ["S", "E501"], "seeds/*" = ["S", "E501"] }

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv", "alembic", "seeds"]
skips = ["B101"]  # assert_used — pytest uses assert
