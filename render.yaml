services:
  # 1. FastAPI Backend API (Free Web Service)
  - type: web
    name: aegis-api
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aegis-redis
          property: connectionString
      - key: QDRANT_HOST
        value: aegis-qdrant
      - key: QDRANT_PORT
        value: 6333
      - key: MINIO_ENDPOINT
        value: aegis-minio:9000
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: google # Set to 'google' or 'openai' in production
      - key: LLM_MODEL
        value: gemini-2.5-flash # Default production LLM
      - key: GOOGLE_API_KEY
        sync: false # Render will prompt the user securely during deployment
      - key: OPENAI_API_KEY
        sync: false # Render will prompt the user securely during deployment
      - key: AUTO_SEED
        value: "true" # Automatically seeds the DB with Navy personnel and manuals on startup
      - key: OLLAMA_BASE_URL
        value: http://change-this-to-your-remote-ollama:11434
      - key: OLLAMA_MODEL
        value: mistral
      - key: CORS_ORIGINS
        value: '["*"]' # Allow all origins by default in staging/prod, or restrict to your frontend URL later

  # 2. Redis Cache (Paid Redis Micro instance — $7/mo, Render free Redis is deprecated)
  - type: redis
    name: aegis-redis
    plan: micro
    region: oregon
    ipAllowList: [] # Keep private within service group

  # 3. Qdrant Vector Database (Paid Private Service — $7/mo Starter plan)
  - type: pserv
    name: aegis-qdrant
    env: docker
    plan: starter
    region: oregon
    envVars:
      - key: QDRANT__STORAGE__STORAGE_PATH
        value: /qdrant/storage
    disk:
      name: qdrant-data
      mountPath: /qdrant/storage
      sizeGB: 1

  # 4. MinIO Object Storage (Paid Private Service — $7/mo Starter plan)
  - type: pserv
    name: aegis-minio
    env: docker
    plan: starter
    region: oregon
    dockerCommand: server /data --console-address ":9001"
    envVars:
      - key: MINIO_ROOT_USER
        value: aegis_admin
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 1

databases:
  # 5. PostgreSQL Database (Free PostgreSQL Tier — Free for 90 days)
  - name: aegis-db
    plan: free
    region: oregon
